<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lists</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>My Lists</h1>

    <!-- To Do Section -->
    <div class="section">
        <div class="section-header">
            <span class="section-icon">✅</span>
            <span class="section-title">To Do</span>
            <span class="item-count" id="todo-count">—</span>
        </div>
        <ul class="items-list" id="todo-list">
            <li class="empty-state">No tasks yet — add one below!</li>
        </ul>
        <div class="add-form">
            <input type="text" class="add-input" id="todo-input" placeholder="Add a task..." maxlength="200">
            <button class="add-btn" id="todo-add">+</button>
        </div>
    </div>

    <!-- Furniture Section -->
    <div class="section">
        <div class="section-header">
            <span class="section-icon">🛋️</span>
            <span class="section-title">Furniture to Buy</span>
            <span class="item-count" id="furniture-count">—</span>
        </div>
        <ul class="items-list" id="furniture-list">
            <li class="empty-state">No furniture yet — add one below!</li>
        </ul>
        <div class="add-form">
            <input type="text" class="add-input" id="furniture-input" placeholder="Add furniture..." maxlength="200">
            <button class="add-btn" id="furniture-add">+</button>
        </div>
    </div>

    <!-- Shopping Overview Section -->
    <div class="section">
        <div class="section-header">
            <span class="section-icon">🛒</span>
            <span class="section-title">Shopping Overview</span>
            <span class="item-count" id="shopping-count">—</span>
        </div>

        <div id="shopping-table-wrap">
            <p class="empty-state">No items yet — add one below!</p>
        </div>

        <div class="shopping-add-form">
            <input type="text"   class="add-input" id="shop-item"     placeholder="Item"     maxlength="100">
            <input type="text"   class="add-input" id="shop-store"    placeholder="Store"    maxlength="100">
            <input type="number" class="add-input" id="shop-price"    placeholder="Price"    min="0" step="0.01">
            <input type="number" class="add-input" id="shop-qty"      placeholder="Qty"      min="1" step="1" value="1">
            <button class="add-btn" id="shopping-add">+</button>
        </div>
    </div>

    <div class="status-bar" id="status">Connecting...</div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import {
            getFirestore,
            collection,
            addDoc,
            onSnapshot,
            updateDoc,
            deleteDoc,
            doc,
            query,
            orderBy,
            serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyASHshwFhuA_TOaSJv34B21JbhlBoimecg",
            authDomain: "todo-3d76e.firebaseapp.com",
            projectId: "todo-3d76e",
            storageBucket: "todo-3d76e.firebasestorage.app",
            messagingSenderId: "679016347673",
            appId: "1:679016347673:web:b2e2cee2cade51e8fa9288",
            measurementId: "G-F1HBKELYLE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const statusEl = document.getElementById('status');

        function setStatus(msg, isError = false) {
            statusEl.textContent = msg;
            statusEl.className = 'status-bar' + (isError ? ' error' : '');
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.appendChild(document.createTextNode(text));
            return d.innerHTML;
        }

        // ── Simple checklist lists (To Do + Furniture) ──────────────────────

        function renderList(listEl, countEl, collectionName, items) {
            const placeholders = {
                todos: 'No tasks yet — add one below!',
                furniture: 'No furniture yet — add one below!'
            };

            if (items.length === 0) {
                listEl.innerHTML = `<li class="empty-state">${placeholders[collectionName]}</li>`;
                countEl.textContent = '—';
                return;
            }

            const remaining = items.filter(i => !i.completed).length;
            countEl.textContent = remaining === 0 ? 'all done!' : `${remaining} left`;

            listEl.innerHTML = '';
            items.forEach(item => {
                const li = document.createElement('li');
                li.className = 'item';
                li.innerHTML = `
                    <div class="item-checkbox ${item.completed ? 'checked' : ''}" data-id="${item.id}"></div>
                    <span class="item-text ${item.completed ? 'completed' : ''}">${escapeHtml(item.text)}</span>
                    <button class="item-delete" data-id="${item.id}" title="Delete">×</button>
                `;
                listEl.appendChild(li);
            });
        }

        function setupList(collectionName, listElId, countElId, inputElId, addBtnElId) {
            const listEl = document.getElementById(listElId);
            const countEl = document.getElementById(countElId);
            const inputEl = document.getElementById(inputElId);
            const addBtn = document.getElementById(addBtnElId);
            const col = collection(db, collectionName);
            const q = query(col, orderBy('createdAt', 'asc'));

            onSnapshot(q, snapshot => {
                const items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderList(listEl, countEl, collectionName, items);
                setStatus('Synced ✓');
            }, err => {
                setStatus('Could not connect — check your Firebase config', true);
                console.error(err);
            });

            async function addItem() {
                const text = inputEl.value.trim();
                if (!text) return;
                inputEl.value = '';
                try {
                    await addDoc(col, { text, completed: false, createdAt: serverTimestamp() });
                } catch (e) {
                    setStatus('Failed to save item', true);
                    console.error(e);
                }
            }

            addBtn.addEventListener('click', addItem);
            inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

            listEl.addEventListener('click', async e => {
                const checkbox = e.target.closest('.item-checkbox');
                const deleteBtn = e.target.closest('.item-delete');

                if (checkbox) {
                    const isChecked = checkbox.classList.contains('checked');
                    try {
                        await updateDoc(doc(db, collectionName, checkbox.dataset.id), { completed: !isChecked });
                    } catch (err) {
                        setStatus('Failed to update item', true);
                    }
                }

                if (deleteBtn) {
                    try {
                        await deleteDoc(doc(db, collectionName, deleteBtn.dataset.id));
                    } catch (err) {
                        setStatus('Failed to delete item', true);
                    }
                }
            });
        }

        setupList('todos', 'todo-list', 'todo-count', 'todo-input', 'todo-add');
        setupList('furniture', 'furniture-list', 'furniture-count', 'furniture-input', 'furniture-add');

        // ── Shopping Overview ────────────────────────────────────────────────

        function formatPrice(price) {
            if (price == null || price === '') return '—';
            return Number(price).toLocaleString('da-DK', { style: 'currency', currency: 'DKK' });
        }

        function renderShopping(items) {
            const wrap    = document.getElementById('shopping-table-wrap');
            const countEl = document.getElementById('shopping-count');

            if (items.length === 0) {
                wrap.innerHTML = '<p class="empty-state">No items yet — add one below!</p>';
                countEl.textContent = '—';
                return;
            }

            const remaining = items.filter(i => !i.completed).length;
            countEl.textContent = remaining === 0 ? 'all done!' : `${remaining} left`;

            // Group by store name, sorted alphabetically (blanks last)
            const groupMap = new Map();
            items.forEach(item => {
                const key = item.store?.trim() || '';
                if (!groupMap.has(key)) groupMap.set(key, []);
                groupMap.get(key).push(item);
            });

            const sortedKeys = [...groupMap.keys()]
                .filter(k => k !== '')
                .sort((a, b) => a.localeCompare(b));
            if (groupMap.has('')) sortedKeys.push('');

            const groups = new Map(sortedKeys.map(k => [k, groupMap.get(k)]));

            let grandTotal = 0;
            let bodyRows = '';

            groups.forEach((groupItems, storeName) => {
                const storeLabel = storeName || 'No store';
                bodyRows += `
                    <tr class="store-header">
                        <td colspan="5">${escapeHtml(storeLabel)}</td>
                    </tr>`;

                let storeTotal = 0;
                groupItems.forEach(item => {
                    const price    = parseFloat(item.price);
                    const qty      = parseInt(item.qty) || 1;
                    const lineTotal = !isNaN(price) ? price * qty : null;
                    if (lineTotal != null && !item.completed) {
                        storeTotal  += lineTotal;
                        grandTotal  += lineTotal;
                    }
                    const done = item.completed ? 'row-completed' : '';
                    bodyRows += `
                        <tr class="${done}">
                            <td><div class="item-checkbox ${item.completed ? 'checked' : ''}" data-id="${item.id}"></div></td>
                            <td class="col-item">${escapeHtml(item.text || '')}</td>
                            <td class="col-price">${lineTotal != null ? formatPrice(lineTotal) : '—'}</td>
                            <td class="col-qty">× ${qty}</td>
                            <td><button class="item-delete" data-id="${item.id}" title="Delete">×</button></td>
                        </tr>`;
                });

                bodyRows += `
                    <tr class="store-subtotal">
                        <td colspan="2">Subtotal</td>
                        <td colspan="3">${formatPrice(storeTotal)}</td>
                    </tr>`;
            });

            wrap.innerHTML = `
                <table class="shopping-table">
                    <thead>
                        <tr>
                            <th style="width:32px"></th>
                            <th>Item</th>
                            <th>Price</th>
                            <th>Qty</th>
                            <th style="width:36px"></th>
                        </tr>
                    </thead>
                    <tbody>${bodyRows}</tbody>
                </table>
                <div class="shopping-total">
                    <span>Grand total</span>
                    <span>${formatPrice(grandTotal)}</span>
                </div>`;
        }

        const SAMPLE_ITEMS = [
            { text: 'Sofa',            store: 'IKEA',    price: 4999, qty: 1 },
            { text: 'Coffee table',    store: 'IKEA',    price: 1299, qty: 1 },
            { text: 'Bookshelf',       store: 'IKEA',    price:  799, qty: 2 },
            { text: 'Wall paint',      store: 'Bauhaus', price:  189, qty: 3 },
            { text: 'Paint brushes',   store: 'Bauhaus', price:   49, qty: 2 },
            { text: 'Cleaning kit',    store: 'Netto',   price:   85, qty: 1 },
            { text: 'Dish soap',       store: 'Netto',   price:   25, qty: 2 },
        ];

        async function seedSampleData(col) {
            for (const item of SAMPLE_ITEMS) {
                await addDoc(col, { ...item, completed: false, createdAt: serverTimestamp() });
            }
        }

        function setupShopping() {
            const col = collection(db, 'shopping');
            const q   = query(col, orderBy('createdAt', 'asc'));

            let seeded = false;
            onSnapshot(q, snapshot => {
                const items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                if (items.length === 0 && !seeded) {
                    seeded = true;
                    seedSampleData(col);
                    return;
                }
                renderShopping(items);
                setStatus('Synced ✓');
            }, err => {
                setStatus('Could not connect — check your Firebase config', true);
                console.error(err);
            });

            async function addItem() {
                const text  = document.getElementById('shop-item').value.trim();
                const store = document.getElementById('shop-store').value.trim();
                const price = document.getElementById('shop-price').value;
                const qty   = document.getElementById('shop-qty').value || '1';
                if (!text) return;

                document.getElementById('shop-item').value  = '';
                document.getElementById('shop-store').value = '';
                document.getElementById('shop-price').value = '';
                document.getElementById('shop-qty').value   = '1';

                try {
                    await addDoc(col, {
                        text,
                        store: store || '',
                        price: price !== '' ? parseFloat(price) : null,
                        qty: parseInt(qty) || 1,
                        completed: false,
                        createdAt: serverTimestamp()
                    });
                } catch (e) {
                    setStatus('Failed to save item', true);
                    console.error(e);
                }
            }

            document.getElementById('shopping-add').addEventListener('click', addItem);
            ['shop-item','shop-store','shop-price','shop-qty'].forEach(id => {
                document.getElementById(id).addEventListener('keydown', e => {
                    if (e.key === 'Enter') addItem();
                });
            });

            document.getElementById('shopping-table-wrap').addEventListener('click', async e => {
                const checkbox  = e.target.closest('.item-checkbox');
                const deleteBtn = e.target.closest('.item-delete');

                if (checkbox) {
                    const isChecked = checkbox.classList.contains('checked');
                    try {
                        await updateDoc(doc(db, 'shopping', checkbox.dataset.id), { completed: !isChecked });
                    } catch (err) {
                        setStatus('Failed to update item', true);
                    }
                }

                if (deleteBtn) {
                    try {
                        await deleteDoc(doc(db, 'shopping', deleteBtn.dataset.id));
                    } catch (err) {
                        setStatus('Failed to delete item', true);
                    }
                }
            });
        }

        setupShopping();
    </script>

</body>

</html>
