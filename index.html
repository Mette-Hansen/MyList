<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lists</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f0eb;
            color: #2d2d2d;
            min-height: 100vh;
            padding: 24px 16px 48px;
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 600;
            color: #5c4a32;
            margin-bottom: 24px;
            letter-spacing: 0.3px;
        }

        .section {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .section-icon {
            font-size: 1.2rem;
        }

        .section-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: #5c4a32;
        }

        .item-count {
            margin-left: auto;
            background: #f0e8de;
            color: #8b6f47;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 2px 9px;
            border-radius: 20px;
        }

        .items-list {
            list-style: none;
            margin-bottom: 14px;
        }

        .item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f0ebe4;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-checkbox {
            width: 22px;
            height: 22px;
            min-width: 22px;
            border-radius: 50%;
            border: 2px solid #c9b99a;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .item-checkbox.checked {
            background: #8b6f47;
            border-color: #8b6f47;
        }

        .item-checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 13px;
            font-weight: bold;
        }

        .item-text {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.4;
            transition: all 0.2s;
        }

        .item-text.completed {
            text-decoration: line-through;
            color: #b0a090;
        }

        .item-delete {
            background: none;
            border: none;
            color: #d4bfab;
            cursor: pointer;
            font-size: 1.3rem;
            padding: 4px 6px;
            border-radius: 6px;
            transition: color 0.2s;
            line-height: 1;
        }

        .item-delete:hover {
            color: #e07070;
        }

        .add-form {
            display: flex;
            gap: 8px;
        }

        .add-input {
            flex: 1;
            border: 2px solid #e8ddd4;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.95rem;
            color: #2d2d2d;
            background: #faf7f4;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .add-input:focus {
            border-color: #8b6f47;
        }

        .add-input::placeholder {
            color: #c0b0a0;
        }

        .add-btn {
            background: #8b6f47;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            font-size: 1.4rem;
            cursor: pointer;
            transition: background 0.2s;
            line-height: 1;
        }

        .add-btn:hover {
            background: #7a6040;
        }

        .empty-state {
            text-align: center;
            color: #c0b0a0;
            font-size: 0.9rem;
            padding: 14px 0;
            font-style: italic;
        }

        .status-bar {
            text-align: center;
            font-size: 0.8rem;
            color: #b0a090;
            margin-top: 4px;
        }

        .status-bar.error {
            color: #c0504a;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <h1>My Lists</h1>

    <!-- To Do Section -->
    <div class="section">
        <div class="section-header">
            <span class="section-icon">✅</span>
            <span class="section-title">To Do</span>
            <span class="item-count" id="todo-count">—</span>
        </div>
        <ul class="items-list" id="todo-list">
            <li class="empty-state">No tasks yet — add one below!</li>
        </ul>
        <div class="add-form">
            <input type="text" class="add-input" id="todo-input" placeholder="Add a task..." maxlength="200">
            <button class="add-btn" id="todo-add">+</button>
        </div>
    </div>

    <!-- Furniture Section -->
    <div class="section">
        <div class="section-header">
            <span class="section-icon">🛋️</span>
            <span class="section-title">Furniture to Buy</span>
            <span class="item-count" id="furniture-count">—</span>
        </div>
        <ul class="items-list" id="furniture-list">
            <li class="empty-state">No furniture yet — add one below!</li>
        </ul>
        <div class="add-form">
            <input type="text" class="add-input" id="furniture-input" placeholder="Add furniture..." maxlength="200">
            <button class="add-btn" id="furniture-add">+</button>
        </div>
    </div>

    <div class="status-bar" id="status">Connecting...</div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import {
            getFirestore,
            collection,
            addDoc,
            onSnapshot,
            updateDoc,
            deleteDoc,
            doc,
            query,
            orderBy,
            serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // ── STEP 1: Paste your Firebase config here ──────────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyASHshwFhuA_TOaSJv34B21JbhlBoimecg",
            authDomain: "todo-3d76e.firebaseapp.com",
            projectId: "todo-3d76e",
            storageBucket: "todo-3d76e.firebasestorage.app",
            messagingSenderId: "679016347673",
            appId: "1:679016347673:web:b2e2cee2cade51e8fa9288",
            measurementId: "G-F1HBKELYLE"
        };
        // ─────────────────────────────────────────────────────────────────────

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const statusEl = document.getElementById('status');

        function setStatus(msg, isError = false) {
            statusEl.textContent = msg;
            statusEl.className = 'status-bar' + (isError ? ' error' : '');
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.appendChild(document.createTextNode(text));
            return d.innerHTML;
        }

        function renderList(listEl, countEl, collectionName, items) {
            const placeholders = {
                todos: 'No tasks yet — add one below!',
                furniture: 'No furniture yet — add one below!'
            };

            if (items.length === 0) {
                listEl.innerHTML = `<li class="empty-state">${placeholders[collectionName]}</li>`;
                countEl.textContent = '—';
                return;
            }

            const remaining = items.filter(i => !i.completed).length;
            countEl.textContent = remaining === 0 ? 'all done!' : `${remaining} left`;

            listEl.innerHTML = '';
            items.forEach(item => {
                const li = document.createElement('li');
                li.className = 'item';
                li.innerHTML = `
                    <div class="item-checkbox ${item.completed ? 'checked' : ''}" data-id="${item.id}"></div>
                    <span class="item-text ${item.completed ? 'completed' : ''}">${escapeHtml(item.text)}</span>
                    <button class="item-delete" data-id="${item.id}" title="Delete">×</button>
                `;
                listEl.appendChild(li);
            });
        }

        function setupList(collectionName, listElId, countElId, inputElId, addBtnElId) {
            const listEl = document.getElementById(listElId);
            const countEl = document.getElementById(countElId);
            const inputEl = document.getElementById(inputElId);
            const addBtn = document.getElementById(addBtnElId);
            const col = collection(db, collectionName);
            const q = query(col, orderBy('createdAt', 'asc'));

            // Live sync from Firestore
            onSnapshot(q, snapshot => {
                const items = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderList(listEl, countEl, collectionName, items);
                setStatus('Synced ✓');
            }, err => {
                setStatus('Could not connect — check your Firebase config', true);
                console.error(err);
            });

            // Add new item
            async function addItem() {
                const text = inputEl.value.trim();
                if (!text) return;
                inputEl.value = '';
                try {
                    await addDoc(col, { text, completed: false, createdAt: serverTimestamp() });
                } catch (e) {
                    setStatus('Failed to save item', true);
                    console.error(e);
                }
            }

            addBtn.addEventListener('click', addItem);
            inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

            // Toggle checked / delete via event delegation
            listEl.addEventListener('click', async e => {
                const checkbox = e.target.closest('.item-checkbox');
                const deleteBtn = e.target.closest('.item-delete');

                if (checkbox) {
                    const isChecked = checkbox.classList.contains('checked');
                    try {
                        await updateDoc(doc(db, collectionName, checkbox.dataset.id), { completed: !isChecked });
                    } catch (err) {
                        setStatus('Failed to update item', true);
                    }
                }

                if (deleteBtn) {
                    try {
                        await deleteDoc(doc(db, collectionName, deleteBtn.dataset.id));
                    } catch (err) {
                        setStatus('Failed to delete item', true);
                    }
                }
            });
        }

        setupList('todos', 'todo-list', 'todo-count', 'todo-input', 'todo-add');
        setupList('furniture', 'furniture-list', 'furniture-count', 'furniture-input', 'furniture-add');
    </script>

</body>

</html>
