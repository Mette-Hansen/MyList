<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Lists</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>My Lists</h1>

    <!-- Grocery List Section -->
    <div class="section">
        <div class="section-header">
            <span class="section-icon">🛒</span>
            <span class="section-title">Grocery List</span>
            <span class="item-count" id="grocery-count">—</span>
        </div>
        <ul class="items-list" id="grocery-list">
            <li class="empty-state">No items yet — add one below!</li>
        </ul>
        <div class="grocery-add-form">
            <input type="text" class="add-input grocery-text-input" id="grocery-input" placeholder="Add item..." maxlength="200">
            <select class="add-input" id="grocery-category"></select>
            <button class="add-btn" id="grocery-add">+</button>
        </div>
    </div>

    <!-- To Do Section -->
    <div class="section">
        <div class="section-header">
            <span class="section-icon">✅</span>
            <span class="section-title">To Do</span>
            <span class="item-count" id="todo-count">—</span>
        </div>
        <ul class="items-list" id="todo-list">
            <li class="empty-state">No tasks yet — add one below!</li>
        </ul>
        <div class="todo-add-form">
            <input type="text" class="add-input todo-text-input" id="todo-input" placeholder="Add a task..." maxlength="200">
            <select class="add-input" id="todo-priority">
                <option value="">Priority</option>
                <option value="high">High</option>
                <option value="mid">Mid</option>
                <option value="low">Low</option>
            </select>
            <label class="todo-needs-help-label">
                <input type="checkbox" id="todo-needs-help">
                <span>Needs help</span>
            </label>
            <button class="add-btn" id="todo-add">+</button>
        </div>
    </div>

    <!-- Shopping Overview Section -->
    <div class="section">
        <div class="section-header">
            <span class="section-icon">🏠</span>
            <span class="section-title">Home Projects</span>
            <span class="item-count" id="shopping-count">—</span>
        </div>

        <div id="shopping-table-wrap">
            <p class="empty-state">No items yet — add one below!</p>
        </div>

        <div class="shopping-add-form">
            <input type="text"   class="add-input" id="shop-item"  placeholder="Item"           maxlength="100">
            <input type="text"   class="add-input" id="shop-store" placeholder="Store"          maxlength="100">
            <input type="number" class="add-input" id="shop-price" placeholder="Price"          min="0" step="1">
            <input type="number" class="add-input" id="shop-qty"   placeholder="Qty"            min="1" step="1" value="1">
            <button class="add-btn" id="shopping-add">+</button>
            <label class="link-toggle-label" id="shop-link-label">
                <input type="checkbox" id="shop-link-toggle">
                <span>Add link</span>
            </label>
            <input type="url" class="add-input shop-link-input" id="shop-link" placeholder="Paste link..." style="display:none">
        </div>
    </div>

    <div class="status-bar" id="status">Connecting...</div>

    <script type="module" src="app.js"></script>

</body>

</html>
